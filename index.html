<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Астро Календарь</title>

  <style>
    body{
      margin:0;
      background:#edf6ff;
      font-family:Arial,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:24px;
      max-width:420px;
      width:100%;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    h1{
      margin-bottom:12px;
    }

    p{
      color:#5b6b7a;
      line-height:1.5;
      margin-bottom:30px;
    }

    .btn{
      display:block;
      background:#7bb4ff;
      color:white;
      text-decoration:none;
      padding:16px;
      border-radius:14px;
      font-weight:bold;
      font-size:18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🌙 Астро Календарь</h1>

  <p>
    Добавьте тестовый лунный календарь
    в Apple Calendar.
  </p>

  <a class="btn"
     href="webcal://raw.githubusercontent.com/tanyabdu/astro-calendar-test/main/astro-calendar.ics">
     Добавить календарь
  </a>
</div>

</body>
</html>
