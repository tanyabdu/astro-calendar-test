<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Астро Календарь</title>

  <style>
    body{
      margin:0;
      padding:0;
      background:#edf6ff;
      font-family:Arial,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:#1f2d3d;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:24px;
      text-align:center;
      width:90%;
      max-width:420px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    h1{
      margin-bottom:12px;
    }

    p{
      color:#5b6b7a;
      line-height:1.5;
      margin-bottom:30px;
    }

    .button{
      display:inline-block;
      padding:16px 28px;
      background:#7bb4ff;
      color:white;
      text-decoration:none;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
    }

    .button:hover{
      opacity:0.9;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🌙 Астро Календарь</h1>

  <p>
    Подключите лунный календарь
    к Apple Calendar одним нажатием.
  </p>

  <a class="button"
     href="webcal://raw.githubusercontent.com/ТВОЙ_НИК/НАЗВАНИЕ_РЕПО/main/astro-calendar.ics">
     Добавить календарь
  </a>
</div>

</body>
</html>
